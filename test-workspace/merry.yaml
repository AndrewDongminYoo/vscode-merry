# --- Development workflow ---------------------------------------------------
development:
  (aliases): dev
  (description): Runs the Flutter application with hot reload enabled, ignoring deprecation warnings.
  (scripts): flutter run --debug --hot --ignore-deprecation

# --- Quality gates ----------------------------------------------------------
pretest:
  (description): Clean Existing Coverage reports
  (scripts): rm -rf coverage

test:
  (description): Runs all tests in the Flutter project with coverage enabled.
  (scripts):
    - flutter test --coverage --concurrency=4 --test-randomize-ordering-seed=random --dart-define="FLUTTER_TEST=true"

posttest:
  (description): Generates a coverage report from the test coverage data.
  (scripts):
    - |
      # Generate Directory Hierarchy HTML
      genhtml coverage/lcov.info -o coverage/html --quiet --simplified-colors --show-zero-columns

# --- Maintenance scripts ----------------------------------------------------
reinstall:
  (description): Cleans and reinstalls the Flutter project by removing old builds, regenerate boiler-plate codes
  (scripts):
    - flutter clean
    - flutter packages get
    - (cd ios && pod install)
    - (cd macos && pod install)

bootstrap:
  (description): Initializes the project by generating necessary code, sorting imports, applying fixes, and formatting.
  (scripts):
    - flutter pub get
    - $generate
    - $format

generate:
  (description): Runs code generation builders and sorts imports to set up project files.
  (scripts):
    - dart run build_runner build --delete-conflicting-outputs
    - $generate-l10n

format:
  (description): Applies automated fixes, sorts imports, and formats the codebase to ensure consistent code quality.
  (scripts):
    - dart fix --apply
    - dart format --line-length 120 .

hard:
  (description): Forces an upgrade of Flutter and its packages to their latest versions and updates CocoaPods
  (scripts):
    - flutter upgrade --force
    - flutter packages upgrade --major-versions --tighten
    - (cd ios && pod update)
    - (cd macos && pod update)

# --- Build artifacts --------------------------------------------------------
build:
  aab:
    (description): 🚨 Builds a Android App Bundle
    (scripts):
      - >
        flutter build appbundle --release
        --tree-shake-icons
        --build-number $(TZ='Asia/Seoul' date +'%y%m%d%H')

  ipa:
    (description): 🚨 Builds an iOS archive bundle Release mode
    (scripts):
      - >
        flutter build ipa --release
        --tree-shake-icons
        --build-number $(TZ='Asia/Seoul' date +'%y%m%d%H')

  apk:
    (description): ⚠️ Builds a Android APK
    (scripts):
      - >
        flutter build apk --release
        --tree-shake-icons
        --build-number $(TZ='Asia/Seoul' date +'%y%m%d%H')

# --- Localization scripts ----------------------------------------------------
generate-l10n:
  (description): Generate Localization Files with `flutter_localizations`
  (aliases): gen-l10n
  (scripts): |
    flutter gen-l10n \
      --format \
      --arb-dir=lib/l10n/arb \
      --template-arb-file=app_ko.arb \
      --output-localization-file=app_localizations.dart \
      --output-dir=lib/l10n/gen \
      --required-resource-attributes \
      --no-nullable-getter \
      --preferred-supported-locales=ko,en

firebase:
  bootstrap:
    (scripts):
      - $firebase:clean
      - $firebase:config:dev
      - $firebase:config:stg
      - $firebase:config:prod

  clean:
    (description): ⚠️ Removes generated Firebase config files (google-services.json, GoogleService-Info.plist, firebase_options*.dart).
    (scripts):
      - rm -f lib/firebase_options.dart
      - rm -f lib/firebase_options_dev.dart
      - rm -f lib/firebase_options_stg.dart

  config:
    dev:
      (description): ⚠️ Generates FlutterFire config for development flavor.
      (scripts):
        - flutterfire configure --project=development

    stg:
      (description): ⚠️ Generates FlutterFire config for staging flavor (Debug/Release).
      (scripts):
        - flutterfire configure --project=staging

    prod:
      (description): ⚠️ Generates FlutterFire config for production flavor.
      (scripts):
        - flutterfire configure --project=production
